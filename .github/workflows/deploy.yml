name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build
        env:
          CI: false

      - name: Deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4